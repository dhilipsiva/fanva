# CI runs everything through the Nix dev shell so the gates get the exact
# pinned toolchain + node + the ilmentufa checkout (NIBLI_CAMXES_DIR) — the
# camxes parse-differential therefore runs FOR REAL here, never skipped.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: fmt + clippy + tests + wasm check + conformance gates
        run: nix develop --command just ci
      - name: wasm-bindgen tests (camxes marshalling under node)
        run: nix develop --command just ci-wasm

  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: seeded fuzz_parse smoke (LSan on)
        run: nix develop --command just fuzz-ci 120
